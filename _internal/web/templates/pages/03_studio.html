
<div id="page-studio" class="page hidden animate-fade-in max-w-6xl mx-auto space-y-6 px-5 pt-8 pb-10 relative">
    
    <div class="flex justify-end w-full mb-4">
        <div class="inline-flex items-center gap-3 bg-slate-900/50 px-3 py-1.5 rounded-full border border-slate-800 shadow-lg">
            <span class="relative flex h-2 w-2">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
            </span>
            <span class="text-[10px] font-bold text-slate-400 tracking-wider">VERSI = 4.1 (Fix: Version Badge Layout Overlap)</span>
        </div>
    </div>
    

    <header class="flex flex-col md:flex-row md:items-start justify-between gap-4 mb-2">
        <div>
            <h2 class="text-3xl font-bold text-white flex items-center gap-3">
                <i class="fa-solid fa-chart-line text-blue-500"></i> Command Center
            </h2>
            <p class="text-slate-400 mt-1">Monitoring sinkronisasi tugas dan pratinjau klip dari Ekstensi Chrome.</p>
        </div>
        <div class="flex gap-4">
            <div class="bg-slate-900 border border-slate-800 px-4 py-2 rounded-xl flex items-center gap-3 shadow-lg">
                <div class="bg-blue-500/20 p-2 rounded-lg"><i class="fa-solid fa-satellite-dish text-blue-500 text-lg animate-pulse" id="api-status-icon"></i></div>
                <div>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Status API</p>
                    <p class="text-sm font-black text-blue-400 leading-none" id="api-status-text">Menerima Data...</p>
                </div>
            </div>
        </div>
    </header>

    <div class="space-y-6">
        <div class="flex items-center justify-between border-b border-slate-800 pb-2">
            <h3 class="text-sm font-bold text-slate-500 uppercase tracking-widest flex items-center gap-2">
                <i class="fa-brands fa-youtube text-lg"></i> Tugas Ekstraksi Berjalan
            </h3>
            <button onclick="clearAllTasks()" class="bg-slate-800 hover:bg-red-900/40 text-slate-400 hover:text-red-400 border border-slate-700 hover:border-red-500/50 px-3 py-1.5 rounded-lg text-xs font-bold transition flex items-center gap-2 shadow-sm">
                <i class="fa-solid fa-broom"></i> Bersihkan Riwayat
            </button>
        </div>
        
        <div id="dashboard-tasks-container" class="space-y-6">
            <div class="bg-slate-900 border border-slate-800 p-10 rounded-2xl text-center shadow-xl">
                <i class="fa-solid fa-satellite-dish text-4xl text-slate-600 mb-4 animate-pulse"></i>
                <h4 class="font-bold text-slate-300">Menunggu Transmisi</h4>
                <p class="text-sm text-slate-500 mt-2">Daftar tugas akan muncul di sini secara real-time.</p>
            </div>
        </div>
    </div>

    <video id="global-clip-player" class="hidden absolute inset-0 w-full h-full object-contain z-30 bg-black" controls controlsList="nodownload"></video>

<div id="video-modal-overlay" class="fixed inset-0 z-[100] hidden bg-slate-950/95 backdrop-blur-md flex items-center justify-center p-4 lg:p-10 opacity-0 transition-opacity duration-300">
    <button onclick="closeVideoModal()" class="absolute top-6 right-6 md:top-10 md:right-10 text-white bg-slate-800/80 hover:bg-red-600 rounded-full w-12 h-12 flex items-center justify-center transition-all z-[110] shadow-2xl border border-slate-600 hover:scale-110">
        <i class="fa-solid fa-xmark text-2xl"></i>
    </button>
    <div id="modal-video-container" class="relative w-full max-w-5xl aspect-video bg-black rounded-2xl overflow-hidden shadow-[0_0_50px_rgba(0,0,0,0.8)] border border-slate-700 transform scale-95 transition-transform duration-300">
        </div>
</div>

</div>

<style>
    /* Custom animation for progress bar stripes */
    @keyframes progress {
        0% { background-position: 1rem 0; }
        100% { background-position: 0 0; }
    }
</style>
