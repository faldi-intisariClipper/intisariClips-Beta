<div id="page-clipper" class="page hidden animate-fade-in max-w-6xl mx-auto space-y-6 px-5 pt-8 pb-5 relative">
    <div class="absolute top-8 right-5 flex items-center gap-3 bg-slate-900/50 px-3 py-1.5 rounded-full border border-slate-800 z-50 shadow-lg">
        <span class="relative flex h-2 w-2">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
        </span>
        <span class="text-[10px] font-bold text-slate-400 tracking-wider">VERSI = 5.3 (Feat: Global Preset Toggle Added)</span>
    </div>
    <header class="flex flex-col md:flex-row md:items-start justify-between gap-4 mb-2">
        <h2 class="text-3xl font-bold text-white flex items-center gap-3">
            <i class="fa-solid fa-scissors text-blue-500"></i> Batch Video Clipper
        </h2>
        <p class="text-slate-400 mt-1">Ekstrak puluhan klip dari satu video panjang menggunakan Timestamps.</p>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="lg:col-span-2 space-y-6">
            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl space-y-5">
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 block">Source Video</label>
                    <div class="flex gap-2">
                        <input type="text" id="c-src" class="flex-1 bg-slate-950 border border-slate-800 rounded-lg px-4 py-2.5 text-sm text-slate-300 focus:outline-none focus:border-blue-500" readonly placeholder="Browse video...">
                        <button onclick="browseFile('c-src')" class="bg-slate-800 hover:bg-slate-700 text-white px-6 py-2.5 rounded-lg text-sm font-bold transition-colors border border-slate-700">Browse</button>
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 block">Output Folder</label>
                    <div class="flex gap-2">
                        <input type="text" id="c-out" class="flex-1 bg-slate-950 border border-slate-800 rounded-lg px-4 py-2.5 text-sm text-slate-300 focus:outline-none focus:border-blue-500" readonly placeholder="Default: Source Dir">
                        <button onclick="browseFolder('c-out')" class="bg-slate-800 hover:bg-slate-700 text-white px-6 py-2.5 rounded-lg text-sm font-bold transition-colors border border-slate-700">Browse</button>
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 block">Project Name (Optional)</label>
                    <input type="text" id="c-proj" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-4 py-2.5 text-sm text-slate-300 focus:outline-none focus:border-blue-500" placeholder="Nama Folder Output">
                </div>
                <div>
                    <div class="flex justify-between items-end mb-2 mt-4">
                        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Timestamps (START|END|TITLE)</label>
                        <button onclick="document.getElementById('file-txt').click()" class="text-[10px] font-bold bg-slate-800 hover:bg-slate-700 text-slate-300 px-3 py-1.5 rounded flex items-center gap-1.5 transition-colors border border-slate-700">
                            <i class="fa-solid fa-file-import"></i> Import .txt
                        </button>
                        <input type="file" id="file-txt" hidden accept=".txt" onchange="importTxt(event, 'c-ts')">
                    </div>
                    <textarea id="c-ts" rows="6" class="w-full bg-slate-950 border border-slate-800 rounded-lg p-4 text-sm font-mono text-slate-300 focus:outline-none focus:border-blue-500 resize-none" placeholder="00:00:10|00:00:25|Klip Menarik"></textarea>
                </div>
            </div>
        </div>

        <div class="lg:col-span-1 space-y-6">
            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl">
                <h3 class="text-sm font-bold text-slate-200 mb-6 flex items-center gap-2 border-b border-slate-800 pb-4">
                    <i class="fa-solid fa-sliders text-slate-400"></i> Settings
                </h3>
                <div class="space-y-4">
                    <div class="flex items-center justify-between bg-slate-950/50 border border-slate-800 p-3 rounded-xl shadow-inner">
                        <div>
                            <label class="text-[10px] font-bold text-blue-400 block uppercase tracking-wider">Use Global Preset</label>
                            <span class="text-[9px] text-slate-500 font-medium">Terapkan font & style dari Settings</span>
                        </div>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="c-use-preset" class="sr-only peer" checked>
                            <div class="w-9 h-5 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-500 shadow-inner"></div>
                        </label>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 mb-2 block">Aspect Ratio</label>
                        <select id="c-ratio" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-4 py-2.5 text-sm text-slate-300 focus:outline-none focus:border-blue-500">
                            <option>Original</option>
                            <option>9:16 (Vertical)</option>
                            <option>1:1 (Square)</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 mb-2 block">Playback Speed</label>
                        <select id="c-speed" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-4 py-2.5 text-sm text-slate-300 focus:outline-none focus:border-blue-500">
                            <option value="1.0">1.0x (Normal)</option>
                            <option value="1.25">1.25x</option>
                            <option value="1.5">1.5x</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 mb-2 block">Pad Start (sec)</label>
                            <input type="number" id="c-pad-start" value="0" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-4 py-2.5 text-sm text-slate-300 focus:outline-none focus:border-blue-500">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 mb-2 block">Pad End (sec)</label>
                            <input type="number" id="c-pad-end" value="0" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-4 py-2.5 text-sm text-slate-300 focus:outline-none focus:border-blue-500">
                        </div>
                    </div>
                    <button id="c-btn" onclick="startClipper()" class="w-full mt-6 bg-blue-600 hover:bg-blue-500 text-white font-black text-sm py-4 rounded-xl shadow-lg shadow-blue-900/20 transition-all flex items-center justify-center gap-2">
                        <i class="fa-solid fa-rocket"></i> START ENGINE
                    </button>

                    <div id="c-prog-area" class="mt-4 hidden">
                        <div class="flex justify-between text-xs mb-1">
                            <span id="c-prog-msg" class="text-slate-400 italic">Initializing...</span>
                            <span id="c-prog-perc" class="font-bold text-blue-400">0%</span>
                        </div>
                        <div class="w-full bg-slate-800 rounded-full h-2 overflow-hidden border border-slate-700">
                            <div id="c-prog-bar" class="bg-blue-500 h-full transition-all" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
